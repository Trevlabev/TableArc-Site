<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" role="img" aria-labelledby="title desc">
  <title id="title">TableArc — AI Tabletop Engine</title>
  <desc id="desc">A gold d20 above a game master screen, surrounded by a blue arc on a dark field, with the TableArc wordmark.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="46%" r="68%">
      <stop offset="0%" stop-color="#101b2a"/>
      <stop offset="62%" stop-color="#07111f"/>
      <stop offset="100%" stop-color="#02050b"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fff1bc"/>
      <stop offset="0.52" stop-color="#f5d783"/>
      <stop offset="1" stop-color="#b8792c"/>
    </linearGradient>
    <filter id="goldGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="blueGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="1200" fill="url(#bg)"/>
  <circle cx="600" cy="446" r="292" fill="none" stroke="#5bbcff" stroke-width="4" stroke-opacity=".72" filter="url(#blueGlow)"/>
  <circle cx="303" cy="446" r="7" fill="#4eb8ff" filter="url(#blueGlow)"/>
  <circle cx="897" cy="446" r="7" fill="#4eb8ff" filter="url(#blueGlow)"/>
  <path d="M600 191 l0 -74 M600 151 l22 31 -22 31 -22 -31z" fill="#5bbcff" opacity=".95" filter="url(#blueGlow)"/>
  <g stroke="url(#gold)" stroke-width="5" fill="none" filter="url(#goldGlow)" stroke-linejoin="round">
    <path d="M600 250 L740 324 L740 505 L600 600 L460 505 L460 324 Z"/>
    <path d="M600 250 L600 345 L740 324"/>
    <path d="M600 345 L460 324"/>
    <path d="M600 345 L690 444 L740 505"/>
    <path d="M600 345 L510 444 L460 505"/>
    <path d="M510 444 L690 444"/>
    <path d="M510 444 L600 600 L690 444"/>
    <path d="M460 505 L600 600 L740 505"/>
  </g>
  <text x="600" y="438" fill="url(#gold)" font-family="Georgia, 'Times New Roman', serif" font-size="58" text-anchor="middle" opacity=".94">20</text>
  <ellipse cx="600" cy="618" rx="94" ry="30" fill="#f5a937" opacity=".48" filter="url(#goldGlow)"/>
  <g stroke="url(#gold)" stroke-width="5" fill="rgba(8,17,31,.34)" filter="url(#goldGlow)" stroke-linejoin="round">
    <path d="M465 622 H735 V783 H465 Z"/>
    <path d="M345 592 L465 650 V783 L345 721 Z"/>
    <path d="M855 592 L735 650 V783 L855 721 Z"/>
    <path d="M488 646 H712 V760 H488 Z" opacity=".75"/>
    <path d="M372 626 L442 662 V731 L372 695 Z" opacity=".75"/>
    <path d="M828 626 L758 662 V731 L828 695 Z" opacity=".75"/>
  </g>
  <text x="600" y="922" fill="url(#gold)" font-family="Georgia, 'Times New Roman', serif" font-size="172" text-anchor="middle" letter-spacing="4">TableArc</text>
  <path d="M218 982 H322 M878 982 H982" stroke="url(#gold)" stroke-width="3" opacity=".8"/>
  <text x="600" y="999" fill="#9ed3ff" font-family="Avenir Next, Montserrat, Arial, sans-serif" font-size="34" text-anchor="middle" letter-spacing="18" font-weight="600">AI TABLETOP ENGINE</text>
</svg>
